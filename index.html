<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>CellRuler 动态展示</title>
    <style>
        body {
            font-family: sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .box {
            width: 800px;
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #334155;
        }

        #display-area {
            width: 100%;
            height: 350px;
            background: #020617;
            border: 1px solid #475569;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            margin: 20px 0;
        }

        .cell {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            position: absolute;
            transition: background-color 1s ease;
            /* 颜色变化平滑 */
            /* 每个细胞在自己的小范围内随机缓慢漂移 */
            animation: drift 8s infinite ease-in-out alternate;
        }

        @keyframes drift {
            from {
                transform: translate(-10px, -10px);
            }

            to {
                transform: translate(10px, 10px);
            }
        }

        .controls {
            text-align: center;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
        }

        .label {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2 style="margin-top:0;">CellRuler：群体比例精确调控</h2>
        <p>调整 <b>ns 序列长度</b>，观察群体中细胞状态的颜色分布：</p>

        <div id="display-area"></div>

        <div class="controls">
            <input type="range" id="ratioSlider" min="0" max="100" value="50" oninput="updateArmy(this.value)">
            <div class="label">
                <span style="color:#f56565;">mScarlet: <span id="valR">50</span>%</span>
                <span style="color:#48bb78;">Venus: <span id="valG">50</span>%</span>
            </div>
        </div>
    </div>

    <script>
        const area = document.getElementById('display-area');
        const cellCount = 100;
        const cells = [];

        // 初始化：给予每个细胞一个随机位置，但之后不再变动
        for (let i = 0; i < cellCount; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            // 随机分布，但远离边缘
            cell.style.left = (5 + Math.random() * 90) + '%';
            cell.style.top = (5 + Math.random() * 85) + '%';
            // 随机动画时长和延迟，增加自然感
            cell.style.animationDuration = (6 + Math.random() * 4) + 's';
            cell.style.animationDelay = (Math.random() * 5) + 's';
            area.appendChild(cell);
            cells.push(cell);
        }

        function updateArmy(val) {
            const redCount = Math.floor(cellCount * (val / 100));
            document.getElementById('valR').innerText = val;
            document.getElementById('valG').innerText = 100 - val;

            cells.forEach((cell, index) => {
                // 仅改变颜色，位置锁定
                cell.style.backgroundColor = (index < redCount) ? '#f56565' : '#48bb78';
            });
        }
        // 初始调用
        updateArmy(50);
    </script>
</body>

</html>
